<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国語 練習問題</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --card: #ffffff; --accent: #b5505a;
    --accent-light: #f3dde0; --text: #2c2420; --text-sub: #7a6a56;
    --border: #e8ddd5; --header-bg: #2c2420; --row-alt: #fdf5f0;
    --green: #4a7a5a; --green-light: #dff0e6;
    --red: #b5505a; --red-light: #f3dde0;
    --yellow: #a07830; --yellow-light: #fdf3dc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Noto Serif JP', serif; color: var(--text); min-height: 100vh; }
  .wrapper { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; }

  /* ── ヘッダー ── */
  .page-header { text-align: center; margin-bottom: 36px; }
  .page-header::after { content: ''; display: block; width: 60px; height: 3px; background: var(--accent); margin: 16px auto 0; }
  .page-header .subtitle { font-size: 11px; letter-spacing: .25em; text-transform: uppercase; color: var(--text-sub); margin-bottom: 8px; }
  .page-header h1 { font-size: 24px; font-weight: 700; letter-spacing: .06em; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-sub); text-decoration: none;
    margin-bottom: 24px; letter-spacing: .04em;
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: 'Noto Serif JP', serif;
  }
  .back-btn:hover { color: var(--accent); }

  /* ── セクション共通 ── */
  .screen { display: none; }
  .screen.active { display: block; }

  .section-title {
    font-size: 13px; font-weight: 700; letter-spacing: .15em;
    color: var(--text-sub); text-transform: uppercase;
    margin-bottom: 14px; margin-top: 28px;
  }
  .section-title:first-child { margin-top: 0; }

  /* ── 選択ボタン群 ── */
  .option-grid { display: grid; gap: 10px; }
  .option-grid.col2 { grid-template-columns: 1fr 1fr; }
  .option-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }

  .opt-btn {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 16px 18px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    cursor: pointer; text-align: left;
    font-family: 'Noto Serif JP', serif;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .opt-btn:hover { background: var(--accent-light); border-color: #e0b0b4; }
  .opt-btn:active { transform: scale(.98); }
  .opt-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .opt-btn .opt-main { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .opt-btn .opt-sub { font-size: 11px; opacity: .7; letter-spacing: .04em; }
  .opt-btn.selected .opt-sub { opacity: .85; }

  .start-btn {
    width: 100%; margin-top: 28px; padding: 15px;
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    font-size: 15px; font-weight: 700; letter-spacing: .1em;
    font-family: 'Noto Serif JP', serif; cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .start-btn:hover { opacity: .9; }
  .start-btn:active { transform: scale(.99); }
  .start-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── 問題画面 ── */
  .progress-bar-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  .question-card {
    background: var(--card); border-radius: 8px;
    padding: 32px 28px; margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(44,36,32,.06);
    border: 1px solid var(--border); text-align: center;
  }
  .question-type-label {
    font-size: 11px; letter-spacing: .2em; color: var(--text-sub);
    margin-bottom: 16px; text-transform: uppercase;
  }
  .question-text {
    font-size: 28px; font-weight: 700; margin-bottom: 8px;
    font-family: 'Noto Sans SC', sans-serif; line-height: 1.3;
  }
  .question-text.jp { font-family: 'Noto Serif JP', serif; font-size: 22px; }
  .question-sub { font-size: 13px; color: var(--text-sub); }

  /* 4択 */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .choice-btn {
    padding: 14px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    font-family: 'Noto Serif JP', serif; font-size: 14px;
    cursor: pointer; text-align: center; line-height: 1.4;
    transition: background .15s, border-color .15s, transform .1s;
    color: var(--text);
  }
  .choice-btn .choice-cn { font-family: 'Noto Sans SC', sans-serif; font-size: 18px; font-weight: 500; display: block; }
  .choice-btn .choice-py { font-size: 11px; color: var(--text-sub); display: block; margin-top: 2px; }
  .choice-btn:hover:not(:disabled) { background: var(--accent-light); border-color: #e0b0b4; }
  .choice-btn:active:not(:disabled) { transform: scale(.98); }
  .choice-btn.correct { background: var(--green-light) !important; border-color: var(--green) !important; color: var(--green) !important; }
  .choice-btn.wrong { background: var(--red-light) !important; border-color: var(--red) !important; color: var(--red) !important; }
  .choice-btn.reveal { background: var(--green-light) !important; border-color: var(--green) !important; color: var(--green) !important; }
  .choice-btn:disabled { cursor: default; }

  /* ピンイン入力 */
  .pinyin-input-wrap { margin-bottom: 16px; }
  .pinyin-input {
    width: 100%; padding: 14px 16px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    font-size: 18px; font-family: 'Noto Serif JP', serif;
    color: var(--text); letter-spacing: .04em;
    outline: none; transition: border-color .15s;
  }
  .pinyin-input:focus { border-color: var(--accent); }
  .pinyin-input.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .pinyin-input.wrong { border-color: var(--red); background: var(--red-light); }
  .pinyin-hint { font-size: 12px; color: var(--text-sub); margin-top: 6px; letter-spacing: .04em; }

  .submit-btn {
    width: 100%; padding: 13px;
    background: var(--header-bg); color: #fff; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600; letter-spacing: .08em;
    font-family: 'Noto Serif JP', serif; cursor: pointer;
    transition: opacity .15s; margin-bottom: 20px;
  }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* 正誤フィードバック */
  .feedback-box {
    border-radius: 6px; padding: 16px 18px; margin-bottom: 16px;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: var(--green-light); border: 1px solid var(--green); }
  .feedback-box.wrong-fb { background: var(--red-light); border: 1px solid var(--red); }
  .feedback-result { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .feedback-box.correct-fb .feedback-result { color: var(--green); }
  .feedback-box.wrong-fb .feedback-result { color: var(--red); }
  .feedback-answer { font-size: 13px; color: var(--text-sub); }
  .feedback-answer strong { color: var(--text); font-family: 'Noto Sans SC', sans-serif; }

  /* 覚えた判定ボタン */
  .mastery-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px 18px; margin-bottom: 20px;
    display: none;
  }
  .mastery-box.show { display: block; }
  .mastery-label { font-size: 12px; color: var(--text-sub); margin-bottom: 10px; letter-spacing: .06em; }
  .mastery-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mastery-btn {
    padding: 11px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; font-family: 'Noto Serif JP', serif;
    cursor: pointer; letter-spacing: .06em;
    transition: background .15s, transform .1s;
  }
  .mastery-btn:active { transform: scale(.98); }
  .mastery-btn.known { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .mastery-btn.known:hover { background: var(--green); color: #fff; }
  .mastery-btn.unknown { background: var(--yellow-light); border-color: var(--yellow); color: var(--yellow); }
  .mastery-btn.unknown:hover { background: var(--yellow); color: #fff; }

  /* ── 結果画面 ── */
  .result-card {
    background: var(--card); border-radius: 8px;
    padding: 32px 28px; margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(44,36,32,.06);
    border: 1px solid var(--border); text-align: center;
  }
  .result-score { font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 8px; }
  .result-score span { font-size: 20px; color: var(--text-sub); }
  .result-label { font-size: 14px; color: var(--text-sub); margin-bottom: 24px; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .stat-box { background: var(--bg); border-radius: 6px; padding: 12px 8px; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-lbl { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

  .result-review { margin-top: 20px; text-align: left; }
  .review-title { font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: .1em; margin-bottom: 10px; }
  .review-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 4px; margin-bottom: 6px;
    background: var(--red-light); border: 1px solid #e8c0c4;
    font-size: 13px;
  }
  .review-item .ri-cn { font-family: 'Noto Sans SC', sans-serif; font-size: 16px; font-weight: 500; }
  .review-item .ri-right { text-align: right; color: var(--text-sub); font-size: 12px; }

  .result-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .action-btn {
    padding: 13px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 600; letter-spacing: .06em;
    font-family: 'Noto Serif JP', serif; cursor: pointer;
    transition: opacity .15s;
  }
  .action-btn:hover { opacity: .85; }
  .action-btn.primary { background: var(--accent); color: #fff; }
  .action-btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  /* ── 進捗確認画面 ── */
  .progress-overview { margin-bottom: 12px; }
  .progress-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--card); border-radius: 4px;
    border: 1px solid var(--border); margin-bottom: 8px; font-size: 13px;
  }
  .progress-row .pr-label { font-weight: 600; }
  .progress-row .pr-bar-wrap { flex: 1; margin: 0 14px; }
  .pr-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .pr-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .5s; }
  .progress-row .pr-num { font-size: 12px; color: var(--text-sub); white-space: nowrap; }

  @media (max-width: 480px) {
    .wrapper { padding: 28px 14px 60px; }
    .question-text { font-size: 22px; }
    .choices { grid-template-columns: 1fr; }
    .result-stats { grid-template-columns: 1fr 1fr 1fr; }
    .opt-btn .opt-main { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- ── 設定画面 ── -->
  <div id="screen-setup" class="screen active">
    <button class="back-btn" onclick="location.href='index.html'">
      ← トップに戻る
    </button>
    <div class="page-header">
      <p class="subtitle">中国語 · 練習問題</p>
      <h1>クイズ設定</h1>
    </div>

    <div class="section-title">課を選択（複数選択可）</div>
    <div style="margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;" id="unit-filter-btns">
      <button class="toggle-btn active" data-unit="all" onclick="filterUnit(this)">全て</button>
      <button class="toggle-btn" data-unit="1" onclick="filterUnit(this)">第1単元</button>
      <button class="toggle-btn" data-unit="2" onclick="filterUnit(this)">第2単元</button>
      <button class="toggle-btn" data-unit="3" onclick="filterUnit(this)">第3単元</button>
    </div>
    <div class="option-grid" id="lesson-options" style="grid-template-columns:repeat(4,1fr);gap:8px;"></div>
    <div style="margin-top:8px;font-size:12px;color:var(--text-sub);" id="lesson-count-label"></div>

    <div class="section-title">問題形式</div>
    <div class="option-grid col2" id="type-options">
      <button class="opt-btn" data-val="4choice-cn-jp" onclick="selectOpt(this,'type')">
        <span class="opt-main">中→日 4択</span>
        <span class="opt-sub">中国語を見て日本語を選ぶ</span>
      </button>
      <button class="opt-btn" data-val="4choice-jp-cn" onclick="selectOpt(this,'type')">
        <span class="opt-main">日→中 4択</span>
        <span class="opt-sub">日本語を見て中国語を選ぶ</span>
      </button>
      <button class="opt-btn" data-val="pinyin" onclick="selectOpt(this,'type')">
        <span class="opt-main">ピンイン入力</span>
        <span class="opt-sub">中国語を見てピンインを入力</span>
      </button>
    </div>

    <div class="section-title">出題モード</div>
    <div class="option-grid col2" id="mode-options">
      <button class="opt-btn" data-val="priority" onclick="selectOpt(this,'mode')">
        <span class="opt-main">⚡ 優先モード</span>
        <span class="opt-sub">未習得を優先・不足分は習得済みで補充</span>
      </button>
      <button class="opt-btn" data-val="all" onclick="selectOpt(this,'mode')">
        <span class="opt-main">🔀 全範囲モード</span>
        <span class="opt-sub">選択範囲からランダム出題</span>
      </button>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>開始する</button>

    <div style="margin-top:28px; text-align:center;">
      <button class="back-btn" onclick="showProgress()" style="justify-content:center;">
        📊 学習進捗を確認する
      </button>
    </div>
  </div>

  <!-- ── 問題画面 ── -->
  <div id="screen-quiz" class="screen">
    <button class="back-btn" onclick="confirmBack()">← 設定に戻る</button>

    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span id="q-counter">1 / 10</span>
        <span id="q-type-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div class="question-card">
      <div class="question-type-label" id="q-direction"></div>
      <div class="question-text" id="q-text"></div>
      <div class="question-sub" id="q-sub"></div>
    </div>

    <!-- 4択 -->
    <div id="choices-wrap" class="choices"></div>

    <!-- ピンイン入力 -->
    <div id="pinyin-wrap" style="display:none;">
      <div class="pinyin-input-wrap">
        <input type="text" class="pinyin-input" id="pinyin-input"
          placeholder="例: ni3hao3 または ni3 hao3"
          autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="pinyin-hint" id="pinyin-hint" style="min-height:18px;"></div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitPinyin()">答える</button>
    </div>

    <!-- フィードバック -->
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-result" id="feedback-result"></div>
      <div class="feedback-answer" id="feedback-answer"></div>
    </div>

    <!-- 覚えた判定 -->
    <div class="mastery-box" id="mastery-box">
      <div class="mastery-label">この単語、覚えましたか？</div>
      <div class="mastery-btns">
        <button class="mastery-btn known" onclick="recordMastery(true)">✓ 覚えた</button>
        <button class="mastery-btn unknown" onclick="recordMastery(false)">△ まだ</button>
      </div>
    </div>
  </div>

  <!-- ── 結果画面 ── -->
  <div id="screen-result" class="screen">
    <div class="page-header">
      <p class="subtitle">クイズ結果</p>
      <h1>お疲れ様でした！</h1>
    </div>

    <div class="result-card">
      <div class="result-score" id="result-score">0<span>/10</span></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-stats">
        <div class="stat-box">
          <div class="stat-num green" id="stat-correct">0</div>
          <div class="stat-lbl">正解</div>
        </div>
        <div class="stat-box">
          <div class="stat-num red" id="stat-wrong">0</div>
          <div class="stat-lbl">不正解</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green" id="stat-known">0</div>
          <div class="stat-lbl">覚えた</div>
        </div>
      </div>
    </div>

    <div class="result-review" id="result-review"></div>

    <div class="result-actions">
      <button class="action-btn primary" onclick="startQuiz()">もう一度</button>
      <button class="action-btn secondary" onclick="showScreen('screen-setup')">設定に戻る</button>
    </div>
  </div>

  <!-- ── 進捗画面 ── -->
  <div id="screen-progress" class="screen">
    <button class="back-btn" onclick="showScreen('screen-setup')">← 戻る</button>
    <div class="page-header">
      <p class="subtitle">学習状況</p>
      <h1>進捗確認</h1>
    </div>
    <div id="progress-content"></div>
    <button class="action-btn secondary" style="width:100%;margin-top:16px;"
      onclick="if(confirm('全ての進捗をリセットしますか？'))resetProgress()">進捗をリセット</button>
  </div>

</div>

// ── ストレージ ──
function loadMastery() {
  try { return JSON.parse(localStorage.getItem('cn_mastery') || '{}'); } catch { return {}; }
}
function saveMastery(m) {
  localStorage.setItem('cn_mastery', JSON.stringify(m));
}
function getMasteryKey(wordId, quizType) { return wordId + '_' + quizType; }

// ── 状態 ──
let cfg = { lessons: new Set(), type: null, mode: null };
let session = { questions: [], current: 0, correct: 0, results: [] };

// ── UI ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── 課選択 ──
function buildLessonButtons(unitFilter) {
  const wrap = document.getElementById('lesson-options');
  wrap.innerHTML = '';
  const lessons = [...new Set(WORDS.map(w => w.unit + '-' + w.lesson))].sort((a,b)=>{
    const [au,al] = a.split('-').map(Number);
    const [bu,bl] = b.split('-').map(Number);
    return au !== bu ? au - bu : al - bl;
  });
  lessons.forEach(key => {
    const [u, l] = key.split('-').map(Number);
    if (unitFilter !== 'all' && u !== parseInt(unitFilter)) return;
    const count = WORDS.filter(w => w.unit === u && w.lesson === l).length;
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (cfg.lessons.has(key) ? ' selected' : '');
    btn.dataset.key = key;
    btn.innerHTML = '<span class="opt-main">第' + l + '課</span><span class="opt-sub">' + count + '語</span>';
    btn.onclick = () => toggleLesson(btn, key);
    wrap.appendChild(btn);
  });
  updateLessonLabel();
}

function toggleLesson(btn, key) {
  if (cfg.lessons.has(key)) {
    cfg.lessons.delete(key);
    btn.classList.remove('selected');
  } else {
    cfg.lessons.add(key);
    btn.classList.add('selected');
  }
  updateLessonLabel();
  updateStartBtn();
}

function filterUnit(btn) {
  document.querySelectorAll('#unit-filter-btns .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildLessonButtons(btn.dataset.unit);
}

function updateLessonLabel() {
  const pool = getWordPool();
  const lbl = document.getElementById('lesson-count-label');
  lbl.textContent = cfg.lessons.size === 0
    ? '課を1つ以上選択してください'
    : cfg.lessons.size + '課選択中・' + pool.length + '語対象';
}

function selectOpt(btn, group) {
  btn.closest('.option-grid').querySelectorAll('.opt-btn')
    .forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  cfg[group] = btn.dataset.val;
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('start-btn').disabled =
    !(cfg.lessons.size > 0 && cfg.type && cfg.mode);
}

// ── 単語フィルタ ──
function getWordPool() {
  if (cfg.lessons.size === 0) return [];
  return WORDS.filter(w => cfg.lessons.has(w.unit + '-' + w.lesson));
}

// 初期化
document.addEventListener('DOMContentLoaded', () => {
  buildLessonButtons('all');
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── クイズ開始 ──
function startQuiz() {
  let pool = getWordPool();
  if (pool.length < 4) { alert('この単元の単語が少なすぎます（最低4語必要）'); return; }

  const mastery = loadMastery();

  if (cfg.mode === 'priority') {
    const unknown = shuffle(pool.filter(w => !mastery[getMasteryKey(w.id, cfg.type)]));
    const known   = shuffle(pool.filter(w =>  mastery[getMasteryKey(w.id, cfg.type)]));
    // 未習得が10問未満なら習得済みで補充
    const need = 10 - unknown.length;
    pool = need > 0 ? [...unknown, ...known.slice(0, need)] : unknown;
  } else {
    pool = shuffle(pool);
  }

  session.questions = pool.slice(0, 10);
  session.current = 0;
  session.correct = 0;
  session.results = [];

  showScreen('screen-quiz');
  renderQuestion();
}

// ── 問題描画 ──
function renderQuestion() {
  const q = session.questions[session.current];
  const total = session.questions.length;

  document.getElementById('q-counter').textContent = (session.current + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = (session.current / total * 100) + '%';

  const typeLabels = {
    '4choice-cn-jp': '中→日 4択',
    '4choice-jp-cn': '日→中 4択',
    'pinyin': 'ピンイン入力'
  };
  document.getElementById('q-type-label').textContent = typeLabels[cfg.type];

  // フィードバック・覚えた判定リセット
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('mastery-box').className = 'mastery-box';

  if (cfg.type === '4choice-cn-jp') {
    document.getElementById('q-direction').textContent = '日本語の意味を選んでください';
    const qt = document.getElementById('q-text');
    qt.className = 'question-text';
    qt.textContent = q.cn;
    document.getElementById('q-sub').textContent = '';
    render4Choice(q, 'jp');
    document.getElementById('choices-wrap').style.display = 'grid';
    document.getElementById('pinyin-wrap').style.display = 'none';

  } else if (cfg.type === '4choice-jp-cn') {
    document.getElementById('q-direction').textContent = '中国語を選んでください';
    const qt = document.getElementById('q-text');
    qt.className = 'question-text jp';
    qt.textContent = q.jp;
    document.getElementById('q-sub').textContent = '';
    render4Choice(q, 'cn');
    document.getElementById('choices-wrap').style.display = 'grid';
    document.getElementById('pinyin-wrap').style.display = 'none';

  } else {
    document.getElementById('q-direction').textContent = 'ピンインを入力してください（声調番号: 例 ni3hao3）';
    const qt = document.getElementById('q-text');
    qt.className = 'question-text';
    qt.textContent = q.cn;
    document.getElementById('q-sub').textContent = q.jp;
    document.getElementById('choices-wrap').style.display = 'none';
    document.getElementById('pinyin-wrap').style.display = 'block';
    const inp = document.getElementById('pinyin-input');
    inp.value = '';
    inp.className = 'pinyin-input';
    inp.disabled = false;
    document.getElementById('pinyin-hint').textContent = '';
    document.getElementById('submit-btn').disabled = false;
    setTimeout(() => inp.focus(), 100);
  }
}

function render4Choice(q, answerField) {
  const pool = getWordPool();
  // 不正解選択肢（同じ答えにならないように）
  const distractors = shuffle(
    pool.filter(w => w.id !== q.id && w[answerField] !== q[answerField])
  ).slice(0, 3);
  const options = shuffle([q, ...distractors]);

  const wrap = document.getElementById('choices-wrap');
  wrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    if (answerField === 'cn') {
      btn.innerHTML = '<span class="choice-cn">' + opt.cn + '</span><span class="choice-py">' + opt.py + '</span>';
    } else {
      btn.textContent = opt.jp;
    }
    btn.dataset.id = opt.id;
    btn.onclick = () => checkChoice(btn, q, opt, answerField);
    wrap.appendChild(btn);
  });
}

// ── 4択 正誤判定 ──
function checkChoice(btn, q, selected, answerField) {
  const isCorrect = selected.id === q.id;
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === q.id) b.classList.add('reveal');
  });
  if (!isCorrect) btn.classList.add('wrong');

  showFeedback(isCorrect, q);
  if (isCorrect) session.correct++;
  session.results.push({ word: q, correct: isCorrect, known: null });
  showMasteryBox();
}

// ── ピンイン正誤判定 ──
// 声調記号→番号変換テーブル
const TONE_MAP = {
  'ā':'a1','á':'a2','ǎ':'a3','à':'a4',
  'ē':'e1','é':'e2','ě':'e3','è':'e4',
  'ī':'i1','í':'i2','ǐ':'i3','ì':'i4',
  'ō':'o1','ó':'o2','ǒ':'o3','ò':'o4',
  'ū':'u1','ú':'u2','ǔ':'u3','ù':'u4',
  'ǖ':'v1','ǘ':'v2','ǚ':'v3','ǜ':'v4',
  'ü':'v',
};

// 声調記号付きピンイン → 声調番号ピンインに正規化（スペース・大文字除去）
function normalizePy(s) {
  let r = s.toLowerCase();
  for (const [mark, num] of Object.entries(TONE_MAP)) {
    r = r.replaceAll(mark, num);
  }
  // ü → v（声調なし）
  r = r.replace(/ü/g, 'v');
  // スペース・ハイフン除去
  r = r.replace(/[\s\-]+/g, '');
  return r;
}

function submitPinyin() {
  const q = session.questions[session.current];
  const inp = document.getElementById('pinyin-input');
  const val = inp.value.trim();
  if (!val) return;

  const userNorm = normalizePy(val);
  const ansNorm  = normalizePy(q.py);
  const isCorrect = userNorm === ansNorm;

  inp.disabled = true;
  document.getElementById('submit-btn').disabled = true;
  inp.className = 'pinyin-input ' + (isCorrect ? 'correct' : 'wrong');

  // ヒント：声調番号表記で正解を表示
  const ansNum = normalizePy(q.py); // 番号表記
  document.getElementById('pinyin-hint').innerHTML = isCorrect
    ? ''
    : '入力: <b>' + normalizePy(val) + '</b>　正解: <b>' + ansNum + '</b>';

  showFeedback(isCorrect, q);
  if (isCorrect) session.correct++;
  session.results.push({ word: q, correct: isCorrect, known: null });
  showMasteryBox();
}

// Enter送信
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pinyin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) submitPinyin();
  });
});

function showFeedback(isCorrect, q) {
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('feedback-result').textContent = isCorrect ? '✓ 正解！' : '✗ 不正解';

  // 声調番号表記も横に並べて表示
  const pyNum = normalizePy(q.py);
  document.getElementById('feedback-answer').innerHTML =
    '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;">' +
      '<span style="font-family:Noto Sans SC,sans-serif;font-size:20px;font-weight:600;color:var(--text);">' + q.cn + '</span>' +
      '<span style="font-size:16px;font-style:italic;color:var(--pinyin,#b5505a);">' + q.py + '</span>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-sub);margin-bottom:2px;">' +
      '声調番号: <b style="letter-spacing:.04em;">' + pyNum + '</b>' +
    '</div>' +
    '<div style="font-size:13px;color:var(--text-sub);">' + q.jp + '</div>';
}

function showMasteryBox() {
  document.getElementById('mastery-box').className = 'mastery-box show';
}

// ── 覚えた記録 ──
function recordMastery(known) {
  const r = session.results[session.results.length - 1];
  r.known = known;

  const mastery = loadMastery();
  mastery[getMasteryKey(r.word.id, cfg.type)] = known;
  saveMastery(mastery);

  document.getElementById('mastery-box').className = 'mastery-box';
  session.current++;
  if (session.current >= session.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ── 結果 ──
function showResult() {
  const total = session.results.length;
  const correct = session.correct;
  const knownCount = session.results.filter(r => r.known).length;
  const wrongItems = session.results.filter(r => !r.correct);

  document.getElementById('result-score').innerHTML = correct + '<span>/' + total + '</span>';
  const pct = Math.round(correct / total * 100);
  document.getElementById('result-label').textContent =
    pct === 100 ? '完璧です！🎉' : pct >= 70 ? 'よくできました！' : 'もう少し頑張りましょう！';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = total - correct;
  document.getElementById('stat-known').textContent = knownCount;

  const reviewWrap = document.getElementById('result-review');
  if (wrongItems.length > 0) {
    reviewWrap.innerHTML = '<div class="review-title">間違えた単語</div>' +
      wrongItems.map(r =>
        '<div class="review-item">' +
        '<span class="ri-cn">' + r.word.cn + '</span>' +
        '<div class="ri-right"><div>' + r.word.py + '</div><div>' + r.word.jp + '</div></div>' +
        '</div>'
      ).join('');
  } else {
    reviewWrap.innerHTML = '';
  }

  showScreen('screen-result');
}

// ── 進捗確認 ──
function showProgress() {
  const mastery = loadMastery();
  const types = [
    { key: '4choice-cn-jp', label: '中→日' },
    { key: '4choice-jp-cn', label: '日→中' },
    { key: 'pinyin',        label: 'ピンイン' },
  ];
  const units = [
    { label: '第1単元', val: 1 },
    { label: '第2単元', val: 2 },
    { label: '第3単元', val: 3 },
  ];

  let html = '';
  units.forEach(u => {
    const lessons = [...new Set(WORDS.filter(w=>w.unit===u.val).map(w=>w.lesson))].sort((a,b)=>a-b);
    html += '<div class="section-title" style="margin-top:20px;">' + u.label + '</div>';
    lessons.forEach(l => {
      const pool = WORDS.filter(w => w.unit === u.val && w.lesson === l);
      html += '<div style="margin-bottom:8px;">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;">第' + l + '課（' + pool.length + '語）</div>';
      html += '<div class="progress-overview">';
      types.forEach(t => {
        const known = pool.filter(w => mastery[getMasteryKey(w.id, t.key)]).length;
        const pct = Math.round(known / pool.length * 100);
        html += '<div class="progress-row" style="padding:8px 14px;">' +
          '<span class="pr-label" style="min-width:60px;font-size:12px;">' + t.label + '</span>' +
          '<div class="pr-bar-wrap"><div class="pr-bar"><div class="pr-fill" style="width:' + pct + '%"></div></div></div>' +
          '<span class="pr-num">' + known + '/' + pool.length + '</span>' +
          '</div>';
      });
      html += '</div></div>';
    });
  });

  document.getElementById('progress-content').innerHTML = html;
  showScreen('screen-progress');
}

function resetProgress() {
  localStorage.removeItem('cn_mastery');
  showProgress();
}

function confirmBack() {
  if (session.current > 0 && confirm('クイズを中断しますか？')) showScreen('screen-setup');
  else if (session.current === 0) showScreen('screen-setup');
}
</script>
